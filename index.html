<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>禾雅寢具 庫存儀錶板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#F8F9FA;color:#2C2C2C;font-size:17px}
:root{
  --bg:#F8F9FA;--surface:#FFFFFF;--primary:#455A64;
  --hoya:#C59A77;--don-g:#294C57;--don-tab:#1D3C45;--don-gold:#D7B33F;--hoyah:#000000;
  --green:#388E3C;--red:#D32F2F;--yellow:#F57F17;
  --muted:#607080;--border:#DDE2E8;
}
/* TOP BAR */
.top-bar{background:var(--surface);border-bottom:1.5px solid var(--border);height:52px;display:flex;align-items:center;padding:0 20px;gap:0;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:700;color:var(--primary);letter-spacing:.04em;margin-right:28px;white-space:nowrap}
.brand-tabs{display:flex;height:100%}
.b-tab{padding:0 16px;cursor:pointer;font-size:14px;font-weight:500;border:none;background:none;border-bottom:3px solid transparent;color:var(--muted);display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;font-family:inherit}
.b-tab:hover{color:var(--primary)}
.b-tab.act{color:var(--primary);border-bottom-color:var(--primary)}
.b-tab.t-hoya.act{color:#8B6A50;border-bottom-color:var(--hoya)}
.b-tab.t-don.act{color:var(--don-g);border-bottom-color:var(--don-g)}
.b-tab.t-hoyah.act{color:#333;border-bottom-color:var(--hoyah)}
.dot{width:8px;height:8px;border-radius:50%}
.d-all{background:var(--primary)}.d-hoya{background:var(--hoya)}.d-don{background:var(--don-g)}.d-hoyah{background:var(--hoyah)}
/* CONTROLS */
.ctrl-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ctrl-grp{display:flex;align-items:center;gap:8px}
.ctrl-lbl{font-size:14px;color:var(--muted);white-space:nowrap}
.seg{padding:5px 13px;font-size:14px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-family:inherit;transition:all .12s}
.seg.act{background:var(--primary);color:#fff;border-color:var(--primary)}
select{padding:5px 9px;font-size:14px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:#2C2C2C;font-family:inherit;cursor:pointer}
.upd-lbl{margin-left:auto;font-size:13px;color:var(--muted)}
/* MAIN */
.main{padding:20px}
.sec-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
/* CATEGORY CARDS */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
@media(max-width:900px){.cards{grid-template-columns:1fr 1fr}}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.cat-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:#B0BEC5}
.cat-card.act{border-color:var(--primary);box-shadow:0 2px 12px rgba(69,90,100,.15)}
.cc-accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:10px 0 0 10px}
.cc-name{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:12px}
.cc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.m-val{font-size:21px;font-weight:700;line-height:1.1}
.m-lab{font-size:13px;color:var(--muted);margin-top:2px}
.cc-turn{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tv{font-size:17px;font-weight:700}
.tv-ok{color:var(--green)}.tv-warn{color:var(--yellow)}.tv-danger{color:var(--red)}
.cc-sub{font-size:13px;color:var(--muted);text-align:right}
/* SERIES PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px}
.panel-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.panel-title{font-size:15px;font-weight:700;color:var(--primary)}
.panel-sub{font-size:13px;color:var(--muted)}
.legend{display:flex;gap:12px;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--muted)}
.leg-sq{width:10px;height:10px;border-radius:2px}
.sum-bar{display:flex;gap:24px;padding:12px 20px;background:#F0F4F5;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sb-item{min-width:80px}
.sb-val{font-size:17px;font-weight:700}
.sb-lab{font-size:13px;color:var(--muted)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:14px;color:var(--muted);font-weight:500;padding:9px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;background:#F8F9FA}
.tbl th:not(:first-child):not(:nth-child(2)){text-align:right}
.tbl td{padding:11px 14px;border-bottom:1px solid #F0F2F4;font-size:16px;vertical-align:middle}
.tbl td:not(:first-child):not(:nth-child(2)){text-align:right}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.data-row:hover td{background:#F5F7F8}
.s-name{font-weight:500;color:var(--primary);cursor:pointer;display:flex;align-items:center;gap:6px}
.s-name:hover{text-decoration:underline}
.exp-btn{font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;flex-shrink:0;transition:transform .2s}
.exp-btn.open{transform:rotate(180deg)}
.badge{display:inline-flex;padding:3px 8px;border-radius:12px;font-size:13px;font-weight:500}
.bg-hoya{background:#FDF0E6;color:#8B6A50}
.bg-don{background:#DDE8EB;color:#1D3C45}
.bg-hoyah{background:#F0F0F0;color:#333}
.st{display:inline-flex;padding:3px 8px;border-radius:3px;font-size:13px;font-weight:500}
.st-ok{background:#E8F5E9;color:var(--green)}
.st-warn{background:#FFF8E1;color:var(--yellow)}
.st-danger{background:#FFEBEE;color:var(--red)}
/* MINI BARS */
.mb-wrap{display:flex;align-items:flex-end;gap:2px;height:28px;min-width:40px}
.mb{border-radius:2px 2px 0 0;flex:1;min-height:2px;position:relative;cursor:pointer}
.mb-25{background:#81C784;opacity:.65}
.mb-26{background:#42A5F5}
.mb-hi{outline:2px solid #F57F17;outline-offset:-1px;opacity:1!important}
.mb-tooltip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:11px;padding:2px 6px;border-radius:3px;white-space:nowrap;z-index:200;pointer-events:none}
.mb:hover .mb-tooltip{display:block}
/* EXPAND ROW */
.exp-row td{background:#F8FAFB;padding:0;border-bottom:1px solid var(--border)}
.exp-inner{padding:16px 20px}
.exp-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:10px}
.note-row{margin-top:10px;font-size:13px;color:var(--muted);display:flex;gap:20px;flex-wrap:wrap}
/* FULL MONTH CHART */
.month-chart-wrap{margin-bottom:14px}
.month-bars{display:flex;align-items:flex-end;gap:3px;height:170px;overflow-x:auto}
.month-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;min-width:22px}
.month-bar-c{display:flex;flex-direction:column;justify-content:flex-end;height:130px;width:100%}
.mbar{border-radius:2px 2px 0 0;width:100%;min-height:2px}
.month-lbl{font-size:10px;color:var(--muted);text-align:center;white-space:nowrap}
.month-val{font-size:10px;color:var(--muted);text-align:center}
/* HOYA H SERIES CARDS */
.hoyah-series-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px 20px}
.hoyah-series-card{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s}
.hoyah-series-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08);border-color:#888}
.hoyah-series-card.act{border-color:#1A1A1A;box-shadow:0 2px 10px rgba(0,0,0,.14)}
.hsc-name{font-size:15px;font-weight:700;color:#1A1A1A;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.hsc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hsc-stat{text-align:center}
.hsc-val{font-size:18px;font-weight:700;color:#1A1A1A}
.hsc-lab{font-size:12px;color:var(--muted);margin-top:2px}
.hsc-turn{margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.hsc-detail{font-size:12px;color:var(--muted)}
.hoyah-detail-panel{padding:0 20px 20px}
.hdp-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px;padding-top:4px}
/* COLOR CARDS */
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:12px}
.color-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.color-img{width:100%;height:56px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa;background:#F0F4F5}
.color-info{padding:7px 8px}
.color-name{font-size:13px;font-weight:500}
.color-sku{font-size:11px;color:var(--muted)}
.color-stock{font-size:14px;font-weight:700;margin-top:3px}
.footer{font-size:13px;color:var(--muted);text-align:center;padding:8px 0 20px}
</style>
</head>
<body>
<!-- TOP BAR -->
<div class="top-bar">
  <div class="logo">禾雅寢具 · 庫存儀錶板</div>
  <div class="brand-tabs">
    <button class="b-tab act" data-brand="ALL" onclick="setBrand(this)"><span class="dot d-all"></span>全部</button>

    <button class="b-tab t-don" data-brand="DON" onclick="setBrand(this)"><span class="dot d-don"></span>DON</button>
    <button class="b-tab t-hoyah" data-brand="HOYA H" onclick="setBrand(this)"><span class="dot d-hoyah"></span>HOYA H</button>

</div>

<div class="main">

      </div>
    </div>
    <div class="sum-bar" id="sum-bar"></div>
    <!-- HOYA H special view -->
    <div id="hoyah-view" style="display:none"></div>
    <!-- Normal table -->
    <div id="normal-view" style="overflow-x:auto">
      <table class="tbl">
        <thead>
          <tr>
            <th>系列名稱</th>
            <th>品牌</th>
            <th id="th-stock1">0A 庫存</th>
            <th>G 倉庫存</th>

    </div>
  </div>
  <div class="footer" id="footer-note">資料來源：Google Sheets EC主力品控管表A · 載入中...</div>
</div>

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
const n = v => parseFloat(String(v).replace(/[^0-9.\-]/g,'')) || 0;

function getStock(row) { return state.scope==='0a' ? n(row.oa_stock) : n(row.total_stock); }

// 前端即時計算周轉月：庫存 ÷ [(去年同月均銷 + 近三個月均銷) ÷ 2]
// 今天 2026/04/27 → 去年同月=2025/04, 近三個月=2026/01,02,03
function calcTurnover(row) {
  const stock = getStock(row);
  if(stock<=0) return 0;
  // 去年同月：今天是4月 → m2504
  const sameMonthKey = 'm2504';
  const sameMonthSales = n(row[sameMonthKey]);
  // 近三個月均銷：不含當月(4月)，取 m2603,m2602,m2601
  const recent3 = (n(row['m2603'])+n(row['m2602'])+n(row['m2601']))/3;
  const avgRef = (sameMonthSales + recent3) / 2;
  if(avgRef<=0) return 0;
  return stock / avgRef;
}

function getTurnover(row) { return calcTurnover(row); }

function getRangeSales(row) {
  const fi = MONTH_OPTS.findIndex(m=>m.val===state.fromM);
  const ti = MONTH_OPTS.findIndex(m=>m.val===state.toM);
  let s=0; for(let i=fi;i<=ti;i++) s+=n(row[MONTH_OPTS[i].val]); return s;
}

// Map a month key to its prior-year equivalent. Returns null if prior year not in data (< 2025)
function priorKey(key) {
  const m = key.match(/^m(\d{2})(\d{2})$/);
  if(!m) return null;
  const py = parseInt(m[1])-1;
  if(py < 25) return null; // 2024 not in dataset
  return `m${String(py).padStart(2,'0')}${m[2]}`;
}

// YoY for selected range vs prior year same months. Returns fraction or null.
function getRangeYoY(row) {
  const fi = MONTH_OPTS.findIndex(m=>m.val===state.fromM);
  const ti = MONTH_OPTS.findIndex(m=>m.val===state.toM);
  const keys = MONTH_OPTS.slice(fi,ti+1).map(m=>m.val);
  const pkeys = keys.map(k=>priorKey(k));
  if(pkeys.some(k=>k===null)) return null;
  const cur  = keys.reduce((s,k)=>s+n(row[k]),0);
  const prev = pkeys.reduce((s,k)=>s+n(row[k]),0);
  if(prev===0) return null;
  return (cur-prev)/prev;
}

function yoyDisp(pct) {
  if(pct===null) return {text:'—', color:'var(--muted)'};
  return {text:(pct>=0?'+':'')+(pct*100).toFixed(1)+'%', color:pct>=0?'var(--green)':'var(--red)'};
}

function updateYoyHint() {
  const fl = MONTH_OPTS.find(m=>m.val===state.fromM)?.lbl||'';
  const tl = MONTH_OPTS.find(m=>m.val===state.toM)?.lbl||'';
  const pfk = priorKey(state.fromM); const ptk = priorKey(state.toM);
  const el = document.getElementById('yoy-hint');
  if(!pfk||!ptk) {
    el.textContent = `YoY：${fl}–${tl} 無去年同期資料`;
    el.style.color='var(--muted)';
  } else {
    const pfl = MONTH_OPTS.find(m=>m.val===pfk)?.lbl||pfk;
    const ptl = MONTH_OPTS.find(m=>m.val===ptk)?.lbl||ptk;
    el.textContent = `YoY 對比：${fl}–${tl} vs ${pfl}–${ptl}`;
    el.style.color='#455A64';
  }
}

function turnoverClass(t) { return t<=3?'tv-ok':t<=6?'tv-warn':'tv-danger'; }
function statusTag(t) {
  return t<=3?'<span class="st st-ok">正常</span>':t<=6?'<span class="st st-warn">注意</span>':'<span class="st st-danger">警示</span>';
}
function brandBadge(b) {
  if(b==='HOYA') return '<span class="badge bg-hoya">HOYA</span>';
  if(b==='DON')  return '<span class="badge bg-don">DON</span>';
  return '<span class="badge bg-hoyah">H</span>';
}
function filteredData() { return SHEET_DATA.filter(r=>state.brand==='ALL'||r.brand===state.brand); }
function dataForCat(catId) {
  const cc = CARD_CATS.find(c=>c.id===catId);
  if(!cc) return [];
  if(cc.hoyah) return SHEET_DATA.filter(r=>r.brand==='HOYA H');
  if(cc.placeholder) return [];
  if(cc.isSeries) return SHEET_DATA.filter(r=>r.series.startsWith(cc.seriesGroup));
  if(cc.isHoyahSeries) return SHEET_DATA.filter(r=>r.brand==='HOYA H'&&r.series.includes(cc.seriesGroup));
  const excluded = cc.excludeSeries||[];
  return filteredData().filter(r=>cc.cats.includes(r.cat1)&&r.brand!=='HOYA H'&&!excluded.includes(r.series));
}
function hoyahRows(keyword) { return SHEET_DATA.filter(r=>r.brand==='HOYA H'&&r.series.includes(keyword)); }

// ─────────────────────────────────────────────────────────
function seriesGroupTurnover(rows) {
  // 加權平均：Σ庫存 ÷ Σ月均銷 (去年同月+近三個月均銷)/2
  const totalStock = rows.reduce((s,r)=>s+getStock(r),0);
  const totalRef   = rows.reduce((s,r)=>{
    const sm=n(r['m2504']); const r3=(n(r['m2603'])+n(r['m2602'])+n(r['m2601']))/3;
    return s+(sm+r3)/2;
  },0);
  return totalRef>0 ? totalStock/totalRef : 0;
}

function renderCards() {
  document.getElementById('cat-cards').innerHTML = CARD_CATS.map(cc=>{
    // 系列卡片：只在各自品牌tab顯示，全部tab不顯示
    if(cc.isSeries && state.brand!==cc.brand) return '';
    // HOYA H 總覽卡：只在全部tab顯示
    if(cc.hoyah && state.brand!=='ALL') return '';
    // HOYA H 系列卡：只在 HOYA H tab 顯示
    if(cc.isHoyahSeries && state.brand!=='HOYA H') return '';

    if(cc.placeholder) return `<div class="cat-card" style="opacity:.55;cursor:default">
      <div class="cc-accent" style="background:${cc.color}"></div>
      <div class="cc-name">${cc.label}</div>
      <div style="margin-top:20px;text-align:center;color:var(--muted);font-size:14px;padding:12px 0">🔧 ${cc.placeholderText}</div>
    </div>`;

    let rows;
    if(cc.hoyah) rows=SHEET_DATA.filter(r=>r.brand==='HOYA H');
    else rows=dataForCat(cc.id);
    if(rows.length===0) return '';

    const stock  = rows.reduce((s,r)=>s+getStock(r),0);
    const g      = rows.reduce((s,r)=>s+n(r.g_stock),0);
    const pending= rows.reduce((s,r)=>s+Math.max(0,n(r.pending)),0);
    const inCont = rows.reduce((s,r)=>s+n(r.in_container),0);

    let avgT, tc;
    if(cc.isSeries||cc.isHoyahSeries||cc.hoyah) {
      const t=seriesGroupTurnover(rows); avgT=t>0?t.toFixed(1):'—'; tc=t>0?turnoverClass(t):'';
    } else {
      const turns=rows.map(r=>getTurnover(r)).filter(t=>t>0);
      avgT=turns.length?(turns.reduce((a,b)=>a+b,0)/turns.length).toFixed(1):'—';
      tc=turns.length?turnoverClass(parseFloat(avgT)):'';
    }
    const act = state.cat===cc.id?' act':'';
    const subLabel = cc.hoyah?'2 系列 · 6 SKU':cc.isHoyahSeries?`${rows.length} SKU`:cc.isSeries?`${rows.length} 品類`:`${rows.length} 系列`;
    const nameStyle = (cc.hoyah||cc.isHoyahSeries)?'color:#1A1A1A':'';
    const onclickFn = cc.hoyah ? `switchToHoyahTab()` : `setCat('${cc.id}')`;
    const ctaText = cc.hoyah ? '點擊前往 HOYA H' : '點擊展開';

    return `<div class="cat-card${act}" onclick="${onclickFn}">
      <div class="cc-accent" style="background:${cc.color}"></div>
      <div class="cc-name" style="${nameStyle}">${cc.label}</div>
      <div class="cc-grid">
        <div><div class="m-val">${stock.toLocaleString()}</div><div class="m-lab">${state.scope==='0a'?'0A 庫存':'全倉庫存'}</div></div>
        <div><div class="m-val">${g.toLocaleString()}</div><div class="m-lab">G 倉庫存</div></div>
        <div><div class="m-val" style="color:${pending>0?'var(--yellow)':'inherit'}">${pending.toLocaleString()}</div><div class="m-lab">未到量</div></div>
        <div><div class="m-val">${inCont.toLocaleString()}</div><div class="m-lab">裝櫃中</div></div>
      </div>
      <div class="cc-turn">
        <div><div class="tv ${tc}">${avgT} 月</div><div class="m-lab">${state.scope==='0a'?'0A':'全倉'}平均周轉月</div></div>
        <div class="cc-sub">${subLabel}<br>${ctaText}</div>
      </div>
    </div>`;
  }).join('');
}

  document.getElementById('th-turn').textContent=state.scope==='0a'?'0A 周轉月':'全倉周轉月';

  const pfk=priorKey(state.fromM); const ptk=priorKey(state.toM);
  const yoyHdr = (pfk&&ptk)
    ? `區間 YoY<br><span style="font-size:11px;font-weight:400">(vs 去年同期)</span>`
    : `區間 YoY<br><span style="font-size:11px;font-weight:400;color:var(--yellow)">(無去年資料)</span>`;
  document.getElementById('th-yoy').innerHTML = yoyHdr;

  const totStock=rows.reduce((s,r)=>s+getStock(r),0);
  const totG=rows.reduce((s,r)=>s+n(r.g_stock),0);
  const totPend=rows.reduce((s,r)=>s+Math.max(0,n(r.pending)),0);
  const totCont=rows.reduce((s,r)=>s+n(r.in_container),0);
  const totSales=rows.reduce((s,r)=>s+getRangeSales(r),0);
  let avgT, tc;
  if(isSeries) {
    const t=seriesGroupTurnover(rows); avgT=t>0?t.toFixed(1):'—'; tc=t>0?turnoverClass(t):'';
  } else {
    const turns=rows.map(r=>getTurnover(r)).filter(t=>t>0);
    avgT=turns.length?(turns.reduce((a,b)=>a+b,0)/turns.length).toFixed(1):'—';
    tc=turns.length?turnoverClass(parseFloat(avgT)):'';
  }
  document.getElementById('sum-bar').innerHTML=`
    <div class="sb-item"><div class="sb-val">${totStock.toLocaleString()}</div><div class="sb-lab">${state.scope==='0a'?'0A 庫存':'全倉庫存'}</div></div>
    <div class="sb-item"><div class="sb-val">${totG.toLocaleString()}</div><div class="sb-lab">G 倉庫存</div></div>
    <div class="sb-item"><div class="sb-val">${totPend.toLocaleString()}</div><div class="sb-lab">未到量</div></div>
    <div class="sb-item"><div class="sb-val">${totCont.toLocaleString()}</div><div class="sb-lab">裝櫃中</div></div>
    <div class="sb-item"><div class="sb-val">${totSales.toLocaleString()}</div><div class="sb-lab">區間銷量</div></div>
    <div class="sb-item"><div class="sb-val ${tc}">${avgT} 月</div><div class="sb-lab">${state.scope==='0a'?'0A':'全倉'}平均周轉月</div></div>
  `;

  const fi=MONTH_OPTS.findIndex(m=>m.val===state.fromM);
  const ti=MONTH_OPTS.findIndex(m=>m.val===state.toM);
  const rangeMonths = ALL_MONTHS.slice(fi, ti+1);
  const maxVal=Math.max(...rows.flatMap(r=>rangeMonths.map(m=>n(r[m.key]))),1);
  const tbody=document.getElementById('series-body');
  tbody.innerHTML='';

  rows.forEach((row,i)=>{
    const t=getTurnover(row); const tc2=turnoverClass(t);
    const rangeSales=getRangeSales(row); const stock=getStock(row);
    const pending=n(row.pending);
    const {text:yoyTxt, color:yoyColor}=yoyDisp(getRangeYoY(row));

    const miniBars=rangeMonths.map((m)=>{
      const v=n(row[m.key]); const h=maxVal>0?Math.max(8,Math.round(v/maxVal*100)):8;
      return `<div class="mb ${m.year===2025?'mb-25':'mb-26'} mb-hi" style="height:${h}%;opacity:1"><div class="mb-tooltip">${m.label}: ${v.toLocaleString()}</div></div>`;
    }).join('');

    // 品類明細：顯示 cat1 + 品牌，不顯示星號
    // 一般系列列表：顯示 series 名稱，不顯示星號
    const nameCell = isSeries
      ? `<div class="s-name" onclick="toggleExpand('exp-${i}',this)">${row.cat1}<button class="exp-btn" id="btn-${i}">▼</button></div>`
      : `<div class="s-name" onclick="toggleExpand('exp-${i}',this)">${row.series}<button class="exp-btn" id="btn-${i}">▼</button></div>`;

    const tr=document.createElement('tr'); tr.className='data-row';
    tr.innerHTML=`
      <td>${nameCell}</td>
      <td>${brandBadge(row.brand)}</td>
      <td style="${stock<100?'color:var(--red);font-weight:600':''}">${stock.toLocaleString()}</td>
      <td>${n(row.g_stock).toLocaleString()}</td>
      <td style="${pending>500?'color:var(--yellow);font-weight:600':''}">${Math.max(0,pending).toLocaleString()}</td>
      <td>${n(row.in_container).toLocaleString()}</td>
      <td><span style="font-weight:600" class="${tc2}">${t.toFixed(1)}月</span></td>
      <td style="font-weight:600">${rangeSales.toLocaleString()}</td>
      <td style="font-weight:700;color:${yoyColor}">${yoyTxt}</td>
      <td><div class="mb-wrap" style="width:${rangeMonths.length*22}px">${miniBars}</div></td>
      <td>${statusTag(t)}</td>
    `;
    tbody.appendChild(tr);

    const expTr=document.createElement('tr'); expTr.className='exp-row'; expTr.id=`exp-${i}`; expTr.style.display='none';
    expTr.innerHTML=`<td colspan="11">${buildExpandContent(row,fi,ti,maxVal)}</td>`;
    tbody.appendChild(expTr);
  });
}

          <td>${stock.toLocaleString()}</td>
          <td>${n(row.g_stock).toLocaleString()}</td>
          <td>${Math.max(0,n(row.pending)).toLocaleString()}</td>
          <td><span class="${tc2}" style="font-weight:600">${t.toFixed(1)}月</span></td>
          <td style="font-weight:600">${sales.toLocaleString()}</td>
          <td style="font-weight:700;color:${yoyColor}">${yoyTxt}</td>
          <td><div class="mb-wrap">${miniBars}</div></td>
          <td>${statusTag(t)}</td>
        </tr>`;
      }).join('');
      detailHtml=`<div class="hoyah-detail-panel">
        <div class="hdp-title">${hs.label} · F包 / HB / B被 明細</div>
        <div style="overflow-x:auto"><table class="tbl">
          <thead><tr>
            <th>品類</th><th>${state.scope==='0a'?'0A 庫存':'全倉庫存'}</th><th>G 倉</th>
            <th>未到量</th><th>周轉月</th><th>區間銷量</th><th>區間 YoY</th><th>月銷趨勢</th><th>狀態</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table></div>
      </div>`;
    }
  }
  document.getElementById('hoyah-view').innerHTML=`<div class="hoyah-series-grid">${cardsHtml}</div>${detailHtml}`;
}

function toggleHoyahDetail(id) {
  state.hoyahSeries = state.hoyahSeries===id ? null : id;
  renderHoyahView();
}

// ─────────────────────────────────────────────────────────
// EXPAND ROW CONTENT
// ─────────────────────────────────────────────────────────
function buildExpandContent(row, fi, ti, maxVal) {
  const colVals=ALL_MONTHS.map(m=>n(row[m.key]));
  const localMax=Math.max(...colVals,1);
  const monthBars=ALL_MONTHS.map((m,mi)=>{
    const v=colVals[mi]; const h=Math.max(2,Math.round(v/localMax*130));
    const isHi=mi>=fi&&mi<=ti;
    const bg=m.year===2025?(isHi?'#66BB6A':'#A5D6A7'):(isHi?'#42A5F5':'#90CAF9');
    return `<div class="month-col">
      <div class="month-val" style="font-size:10px;font-weight:600;color:${m.year===2026?'#1976D2':'#2E7D32'}">${v>0?v.toLocaleString():''}</div>
      <div class="month-bar-c"><div class="mbar" style="height:${h}px;background:${bg}"></div></div>
      <div class="month-lbl">${m.label}</div>
    </div>`;
  }).join('');
  const pending=n(row.pending); const inCont=n(row.in_container);
  const calcT=getTurnover(row);
  return `<div class="exp-inner">
    <div class="exp-title">${row.series} · 月銷趨勢（全年概覽，橘框為選取區間）</div>
    <div class="month-chart-wrap"><div class="month-bars">${monthBars}</div></div>
    <div class="note-row">
      <span>品牌：${row.brand}</span><span>類別：${row.cat1}</span>
      <span>0A：${n(row.oa_stock).toLocaleString()}</span><span>G倉：${n(row.g_stock).toLocaleString()}</span>
      ${pending!==0?`<span>未到量：${Math.max(0,pending).toLocaleString()}</span>`:''}
      ${inCont>0?`<span>裝櫃中：${inCont.toLocaleString()}</span>`:''}
      <span>周轉月（即時）：${calcT>0?calcT.toFixed(1):'—'}月</span>
    </div>
    <!-- 第二階段：Airtable 花色圖片串接預留位置 -->
  </div>`;
}

function toggleExpand(id, nameEl) {
  const row=document.getElementById(id); const btn=nameEl?nameEl.querySelector('.exp-btn'):null;
  if(!row) return;
  const open=row.style.display!=='none';
  row.style.display=open?'none':'table-row';
  if(btn) btn.classList.toggle('open',!open);
}

// ─────────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────────
// 點擊 HOYA H 總覽卡時跳轉到 HOYA H tab
function switchToHoyahTab() {
  document.querySelectorAll('.b-tab').forEach(t=>t.classList.remove('act'));
  document.querySelector('.b-tab.t-hoyah').classList.add('act');
  state.brand='HOYA H';
  state.cat='HS60';
  state.hoyahSeries=null;
  render();
}

function setBrand(el) {
  document.querySelectorAll('.b-tab').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');
  state.brand=el.dataset.brand;
  if(state.brand==='HOYA H') {
    state.cat='HS60'; // 預設顯示 100素色天絲
  } else if(['HS60','HS花'].includes(state.cat)) {
    state.cat='FH'; // 離開 HOYA H tab，回到 FH
  } else if(state.brand!=='ALL' && ['S60','SLITE','SIMPLE'].includes(state.cat)) {
    if(state.brand!=='HOYA' && state.cat==='S60') state.cat='FH';
    if(state.brand!=='DON' && ['SLITE','SIMPLE'].includes(state.cat)) state.cat='BA';
  }
  state.hoyahSeries=null;
  render();
}
function setScope(el) {
  document.querySelectorAll('.seg').forEach(b=>b.classList.remove('act'));
  el.classList.add('act'); state.scope=el.dataset.scope; render();
}
function setCat(id) {
  if(state.cat===id) return;
  state.cat=id; state.hoyahSeries=null; render();
}
function updateRange() {
  const f=document.getElementById('sel-from').value;
  const t=document.getElementById('sel-to').value;
  const fi=MONTH_OPTS.findIndex(m=>m.val===f);
  const ti=MONTH_OPTS.findIndex(m=>m.val===t);
  if(ti<fi){document.getElementById('sel-to').value=f;state.toM=f;}else state.toM=t;
  state.fromM=f; render();
}
function render() { renderCards(); renderSeries(); }

// ─────────────────────────────────────────────────────────
// API 串接 - Google Apps Script
// ─────────────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbxph4wSRp07OaKSXCeg2s6mm3UD41PtgoFvFxsHrDlfDr_2uOy4X10UzdINYkeRc5A/exec';

async function loadData() {
  // 顯示載入中 overlay，不覆蓋 panel 結構
  const overlay = document.createElement('div');
  overlay.id = 'loading-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;z-index:999;font-size:17px;color:var(--muted)';
  overlay.textContent = '⏳ 資料載入中，請稍候...';
  document.body.appendChild(overlay);

  try {
    const res = await fetch(API_URL);
    const json = await res.json();

    document.body.removeChild(overlay);

    if (json.error) {
      if (json.error === '無存取權限') {
        alert(`您的帳號（${json.email}）沒有存取權限，請聯繫管理員`);
      } else {
        alert('資料載入失敗：' + json.error);
      }
      return;
    }

    // 用 API 回傳資料取代靜態資料
    SHEET_DATA.length = 0;
    json.data.forEach(d => SHEET_DATA.push(d));

    // 更新時間顯示
    const updatedAt = new Date(json.updatedAt);
    const pad = n => String(n).padStart(2,'0');
    const dateStr = `${updatedAt.getFullYear()}/${pad(updatedAt.getMonth()+1)}/${pad(updatedAt.getDate())} ${pad(updatedAt.getHours())}:${pad(updatedAt.getMinutes())}`;
    document.getElementById('footer-note').textContent = `資料來源：Google Sheets EC主力品控管表A · 即時更新 ${dateStr}`;
    document.getElementById('data-date-lbl').textContent = `資料更新：${dateStr}`;

    // 重新渲染（panel 結構不動，只更新資料）
    render();

  } catch(err) {
    if(document.getElementById('loading-overlay')) document.body.removeChild(overlay);
    alert('網路連線異常，請重新整理頁面。\n錯誤：' + err.message);
  }
}

// ─────────────────────────────────────────────────────────
// START
// ─────────────────────────────────────────────────────────
initSelects();
render(); // 先用靜態資料渲染，避免白畫面
loadData(); // 非同步載入即時資料
</script>
